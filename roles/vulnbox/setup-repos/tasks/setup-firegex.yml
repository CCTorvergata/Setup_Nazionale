---
- name: Download firegex
  ansible.builtin.git:
    repo: https://github.com/Pwnzer0tt1/firegex
    dest: "{{ vulnbox_repos_dir }}/firegex"
    force: true

- name: Generate password for firegex
  ansible.builtin.set_fact:
    firegex_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"

- name: Create out directory
  ansible.builtin.file:
    path: "{{ playbook_dir }}/out/"
    state: directory
    mode: '0700'
  delegate_to: localhost

- name: Print firegex password on a file
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/out/firegex_password.txt"
    content: "{{ firegex_password }}"
    mode: "0644"
  delegate_to: localhost

- name: Start firegex
  ansible.builtin.command: "python3 run.py start --prebuilt --port {{ firegex_port }} --startup-psw {{ firegex_password }}"
  args:
    chdir: "{{ vulnbox_repos_dir }}/firegex"
